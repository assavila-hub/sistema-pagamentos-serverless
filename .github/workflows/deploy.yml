name: Deploy to Amazon ECS
# O robô acorda sempre que houver um "push" na branch "main"
on:
  push:
    branches:
      - main
env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: payment-api
  ECS_CLUSTER: payment-cluster
  ECS_SERVICE: payment-api-service
jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest # O GitHub empresta-nos um computador Linux temporário
    steps:
    - name: 📥 Clonar o repositório
      uses: actions/checkout@v3
    - name: ☕ Configurar o Java 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: 🔨 Compilar o projeto com Maven
      run: ./mvnw clean package -DskipTests
    - name: 🔐 Autenticar na AWS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    - name: 🐳 Fazer Login no Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1
    - name: 🚀 Criar imagem Docker e enviar para ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
    - name: 🔄 Reiniciar o ECS Fargate com a nova imagem
      run: |
        aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.ECS_SERVICE }} --force-new-deployment